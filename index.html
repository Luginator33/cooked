<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="cooked" />
    <meta name="description" content="Know where to go tonight" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&family=Dancing+Script:wght@400;700&display=block" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>cooked</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent double-tap zoom and reset zoom after keyboard dismisses
      document.addEventListener('touchend', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        // Reset any accidental zoom
        if (window.visualViewport && window.visualViewport.scale > 1) {
          document.querySelector('meta[name=viewport]').setAttribute('content',
            'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
        }
      }, { passive: true });
      // Also reset on blur (keyboard dismiss)
      document.addEventListener('focusout', function() {
        setTimeout(function() {
          if (window.visualViewport && window.visualViewport.scale > 1) {
            window.scrollTo(0, window.scrollY);
          }
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
